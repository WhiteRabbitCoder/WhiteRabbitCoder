<svg width="860" height="960" viewBox="0 0 860 960" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes dash{to{stroke-dashoffset:-220}}
@keyframes driftA{0%,100%{transform:translate(0,0) rotate(-9deg)}50%{transform:translate(-8px,-8px) rotate(-14deg)}}
@keyframes driftB{0%,100%{transform:translate(0,0) rotate(8deg)}50%{transform:translate(7px,-7px) rotate(12deg)}}
@keyframes driftC{0%,100%{transform:translate(0,0) rotate(-6deg)}50%{transform:translate(-6px,-9px) rotate(-2deg)}}
@keyframes flapL{0%,100%{transform:rotate(0deg) scale(1)}50%{transform:rotate(-20deg) scale(1.05)}}
@keyframes flapR{0%,100%{transform:rotate(0deg) scale(1)}50%{transform:rotate(20deg) scale(1.05)}}

.bg{fill:#0d1117}
.panel{fill:#161b22}
.brd{stroke:#30363d}
.txt{fill:#e6edf3}
.muted{fill:#8b949e}
.acc{fill:#58a6ff}
.grn{fill:#3fb950}
.sec{fill:#8b949e;letter-spacing:1.6px}
.tj{fill:#c9a800}
.signal{stroke:url(#linePulse);stroke-width:1.25;stroke-dasharray:8 12;animation:dash 10s linear infinite}

.wrap{animation:fadeIn .45s ease}
.hero{animation:fadeIn .6s .08s both}
.about{animation:fadeIn .55s .25s both}
.stack{animation:fadeIn .55s .45s both}
.proj{animation:fadeIn .55s .62s both}
.p1{animation:fadeIn .45s .78s both}
.p2{animation:fadeIn .45s .9s both}
.p3{animation:fadeIn .45s 1.02s both}
.p4{animation:fadeIn .45s 1.14s both}
.p5{animation:fadeIn .45s 1.26s both}
.p6{animation:fadeIn .45s 1.38s both}
.cur{animation:blink 1.05s step-end infinite}

.bf1{animation:driftA 6.8s ease-in-out infinite}
.bf2{animation:driftB 8.2s ease-in-out 1.4s infinite}
.bf3{animation:driftC 9.4s ease-in-out 2.4s infinite}
.wing-l,.wing-r{transform-box:fill-box}
.wing-l{transform-origin:right center;animation:flapL .82s ease-in-out infinite}
.wing-r{transform-origin:left center;animation:flapR .82s ease-in-out infinite}
.bf2 .wing-l,.bf2 .wing-r{animation-duration:.96s}
.bf3 .wing-l,.bf3 .wing-r{animation-duration:1.08s}

@media(prefers-color-scheme:light){
.bg{fill:#ffffff}
.panel{fill:#f6f8fa}
.brd{stroke:#d0d7de}
.txt{fill:#24292f}
.muted{fill:#57606a}
.acc{fill:#0969da}
.grn{fill:#1a7f37}
.sec{fill:#57606a;letter-spacing:1.6px}
.tj{fill:#7a6700}
}

@media(prefers-reduced-motion:reduce){
*{animation:none!important}
}
</style>

<linearGradient id="topGlow" x1="0" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
